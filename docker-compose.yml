services:
  postgres:
    image: postgres:16-alpine
    container_name: facebook-pancake-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pancake
      POSTGRES_PASSWORD: pancake
      POSTGRES_DB: pancake
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pancake -d pancake']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
